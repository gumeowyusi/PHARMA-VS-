<!DOCTYPE html>
<html lang="vi">
<head>
  <th:block th:replace="~{user/_meta}" />
  <title>Lịch sử mua hàng – MEDISALE</title>
  <script th:src="@{/js/toast.js}" type="module"></script>
  <script th:src="@{/js/home.js}" type="module"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body { background: #f0f4ff; }
    .account-section { padding: 2.5rem 0 3.5rem; }
    /* sidebar nav */
    .acc-nav .list-group-item {
      border: none; border-radius: 10px !important; margin-bottom: .35rem;
      font-weight: 500; color: #374151; padding: .65rem 1.1rem;
      transition: background .18s, color .18s;
    }
    .acc-nav .list-group-item:hover { background: #e8f0fe; color: #0d6efd; }
    .acc-nav .list-group-item.active {
      background: linear-gradient(135deg,#0d6efd,#2563eb); color: #fff;
      box-shadow: 0 4px 14px -4px rgba(13,110,253,.4);
    }
    /* main card */
    .acc-card {
      background: #fff; border-radius: 18px;
      border: 1.5px solid #e2e8f0;
      box-shadow: 0 4px 24px -6px rgba(13,110,253,.10);
      overflow: hidden;
    }
    .acc-card-header {
      display: flex; align-items: center; gap: .65rem;
      padding: 1.1rem 1.4rem .9rem;
      border-bottom: 1.5px solid #e2e8f0;
      font-weight: 700; font-size: 1rem; color: #1e293b;
    }
    .acc-card-header .icon-wrap {
      width: 36px; height: 36px; border-radius: 9px;
      background: #e8f0fe; color: #0d6efd;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    /* product grid */
    .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 1.1rem; padding: 1.25rem 1.4rem; }
    .prod-card {
      background: #f8fafc; border: 1.5px solid #e2e8f0;
      border-radius: 14px; overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      display: flex; flex-direction: column;
    }
    .prod-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px -8px rgba(13,110,253,.18); }
    .prod-card-img {
      aspect-ratio: 1; width: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #f1f5f9; overflow: hidden;
    }
    .prod-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .prod-card-body { padding: .75rem .85rem .85rem; flex: 1; display: flex; flex-direction: column; gap: .3rem; }
    .prod-card-name { font-size: .82rem; font-weight: 600; color: #1e293b; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .prod-card-price { font-size: .88rem; font-weight: 700; color: #0d6efd; margin-top: auto; }
    .prod-card-old { font-size: .75rem; color: #94a3b8; text-decoration: line-through; }
    .prod-card-badge { display: inline-block; font-size: .68rem; font-weight: 700; background: #fef3c7; color: #b45309; border-radius: 6px; padding: .15rem .45rem; }
    .prod-card-btn {
      display: block; text-align: center; padding: .45rem;
      background: #e8f0fe; color: #0d6efd; font-size: .78rem; font-weight: 600;
      border-top: 1px solid #e2e8f0; text-decoration: none;
      transition: background .15s, color .15s;
    }
    .prod-card-btn:hover { background: #0d6efd; color: #fff; }
    /* empty */
    .history-empty { text-align: center; padding: 3.5rem 1rem; color: #94a3b8; }
    .history-empty .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: .5; }
    /* pagination */
    .acc-pagination { padding: .5rem 1.4rem 1.25rem; display: flex; justify-content: center; }
    .page-link { border-radius: 8px !important; border: 1.5px solid #e2e8f0; color: #374151; font-size: .83rem; padding: .4rem .75rem; }
    .page-item.active .page-link { background: #0d6efd; border-color: #0d6efd; color: #fff; }
  </style>
</head>
<body>
<th:block th:replace="~{user/_header}" />

<section class="account-section">
  <div class="container">
    <div class="row g-4">

      <!-- Sidebar nav -->
      <div class="col-md-3">
        <div class="acc-card acc-nav p-2">
          <a class="list-group-item" href="/order"><i class="fas fa-receipt me-2"></i>Đơn hàng của tôi</a>
          <a class="list-group-item active" href="/history"><i class="fas fa-history me-2"></i>Lịch sử mua</a>
          <a class="list-group-item" href="/changePassword"><i class="fas fa-lock me-2"></i>Đổi mật khẩu</a>
          <a class="list-group-item" href="/setting"><i class="fas fa-cog me-2"></i>Thiết đặt</a>
          <a class="list-group-item text-danger" href="/signout"><i class="fas fa-sign-out-alt me-2"></i>Đăng xuất</a>
        </div>
      </div>

      <!-- Main content -->
      <div class="col-md-9">
        <div class="acc-card">
          <div class="acc-card-header">
            <div class="icon-wrap"><i class="fas fa-history"></i></div>
            Sản phẩm đã mua
          </div>

          <!-- Empty state -->
          <div th:if="${#lists.isEmpty(sanphams)}" class="history-empty">
            <div class="empty-icon"><i class="fas fa-box-open"></i></div>
            <div class="fw-semibold fs-5 mb-1">Chưa có lịch sử mua hàng</div>
            <div class="small mb-3">Hãy mua sắm để xem lại các sản phẩm bạn đã mua</div>
            <a href="/" class="btn btn-primary btn-sm px-4" style="border-radius:10px;">
              <i class="fas fa-shopping-bag me-1"></i>Mua sắm ngay
            </a>
          </div>

          <!-- Product grid -->
          <div th:if="${!#lists.isEmpty(sanphams)}" class="history-grid">
            <div th:each="sanpham : ${sanphams}" class="prod-card">
              <a th:href="@{/sanpham(id=${sanpham.idSanpham})}" class="prod-card-img">
                <img th:src="@{/image/{url}(url=${sanpham.hinh})}" th:alt="${sanpham.tenSanpham}"
                     onerror="this.parentElement.innerHTML='<i class=\'fas fa-capsules text-muted\' style=\'font-size:2rem;opacity:.3;\'></i>'" />
              </a>
              <div class="prod-card-body">
                <div class="prod-card-name" th:text="${sanpham.tenSanpham}"></div>
                <div th:if="${sanpham.giamgia > 0}">
                  <div class="prod-card-price"
                       th:text="${#numbers.formatInteger(sanpham.gia * (100 - sanpham.giamgia) / 100, 0, 'COMMA')} + '₫'"></div>
                  <div class="d-flex align-items-center gap-1 mt-1">
                    <span class="prod-card-old" th:text="${#numbers.formatInteger(sanpham.gia, 0, 'COMMA')} + '₫'"></span>
                    <span class="prod-card-badge" th:text="'-' + ${sanpham.giamgia} + '%'"></span>
                  </div>
                </div>
                <div th:if="${sanpham.giamgia == 0}">
                  <div class="prod-card-price" th:text="${#numbers.formatInteger(sanpham.gia, 0, 'COMMA')} + '₫'"></div>
                </div>
              </div>
              <a th:href="@{/sanpham(id=${sanpham.idSanpham})}" class="prod-card-btn">
                <i class="fas fa-eye me-1"></i>Xem lại
              </a>
            </div>
          </div>

          <!-- Pagination -->
          <div th:if="${totalPages > 1}" class="acc-pagination">
            <nav>
              <ul class="pagination pagination-sm gap-1 mb-0">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                  <a class="page-link" th:href="@{/history(page=${currentPage - 1})}">
                    <i class="fas fa-chevron-left" style="font-size:.7rem;"></i>
                  </a>
                </li>
                <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                    class="page-item" th:classappend="${currentPage == i - 1} ? 'active'">
                  <a class="page-link" th:href="@{/history(page=${i - 1})}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                  <a class="page-link" th:href="@{/history(page=${currentPage + 1})}">
                    <i class="fas fa-chevron-right" style="font-size:.7rem;"></i>
                  </a>
                </li>
              </ul>
            </nav>
          </div>

        </div>
      </div>

    </div>
  </div>
</section>

<th:block th:replace="~{user/_footer}" />
</body>
</html>
