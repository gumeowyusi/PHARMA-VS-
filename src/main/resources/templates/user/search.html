<!DOCTYPE html>
<html lang="vi">
<head>
  <th:block th:replace="~{user/_meta}" />
  <title th:text="'Kết quả tìm kiếm cho ' + ${query}"></title>
  <script th:src="@{/js/toast.js}" type="module"></script>
  <script th:src="@{/js/home.js}" type="module"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body class="bg-light">
  <th:block th:replace="~{user/_header}" />

  <!-- Search Results Header -->
  <section class="section-pagetop bg-white border-bottom">
    <div class="container">
      <div class="py-4">
        <h2 class="section-title fw-bold mb-2">
          <i class="fas fa-search text-primary me-2"></i>Kết quả tìm kiếm
        </h2>
        <p class="text-muted mb-0">
          Tìm thấy <span class="fw-bold text-primary" th:text="${totalProducts}"></span> sản phẩm 
          cho "<span class="fst-italic" th:text="${query}"></span>"
        </p>
      </div>
    </div>
  </section>

  <!-- Search Results -->
  <section class="section-content py-5">
    <div class="container">
      <div class="row g-4">

        <!-- Filter Sidebar -->
        <aside class="col-lg-3">
          <div class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
              <form th:action="@{/search}" method="get" id="filterForm">
                <input type="hidden" name="q" th:value="${query}">

                <!-- Category Filter -->
                <div class="filter-group mb-4">
                  <h6 class="fw-bold mb-3">
                    <i class="fas fa-th-list me-2"></i>Danh mục
                  </h6>
                  <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="idLoai" value=""
                           id="cat_all" th:checked="${idLoai == null}">
                    <label class="form-check-label" for="cat_all">Tất cả danh mục</label>
                  </div>
                  <div th:each="loai : ${allLoais}" class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="idLoai"
                           th:value="${loai.idLoai}" th:id="'cat_' + ${loai.idLoai}"
                           th:checked="${idLoai != null and idLoai == loai.idLoai}">
                    <label class="form-check-label" th:for="'cat_' + ${loai.idLoai}"
                           th:text="${loai.tenLoai}"></label>
                  </div>
                </div>

                <!-- Price Filter -->
                <div class="filter-group mb-4">
                  <h6 class="fw-bold mb-3">
                    <i class="fas fa-dollar-sign me-2"></i>Giá bán
                  </h6>
                  <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" value="" id="price_all"
                           name="priceRanges" th:checked="${priceRanges == null or priceRanges == ''}">
                    <label class="form-check-label" for="price_all">Tất cả</label>
                  </div>
                  <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" value="0-50000" id="price_1"
                           name="priceRanges" th:checked="${priceRanges == '0-50000'}">
                    <label class="form-check-label" for="price_1">Dưới 50.000₫</label>
                  </div>
                  <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" value="50000-200000" id="price_2"
                           name="priceRanges" th:checked="${priceRanges == '50000-200000'}">
                    <label class="form-check-label" for="price_2">50.000₫ - 200.000₫</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" value="200000-infinity" id="price_3"
                           name="priceRanges" th:checked="${priceRanges == '200000-infinity'}">
                    <label class="form-check-label" for="price_3">Trên 200.000₫</label>
                  </div>
                </div>

                <!-- Sort Filter -->
                <div class="filter-group mb-4">
                  <h6 class="fw-bold mb-3">
                    <i class="fas fa-sort me-2"></i>Sắp xếp theo
                  </h6>
                  <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" value="createdAt-DESC" id="sort_1"
                           name="order" th:checked="${order == 'createdAt-DESC' or order == null}">
                    <label class="form-check-label" for="sort_1">
                      <i class="fas fa-clock me-2"></i>Mới nhất
                    </label>
                  </div>
                  <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" value="totalBuy-DESC" id="sort_2"
                           name="order" th:checked="${order == 'totalBuy-DESC'}">
                    <label class="form-check-label" for="sort_2">
                      <i class="fas fa-fire me-2"></i>Bán chạy nhất
                    </label>
                  </div>
                  <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" value="price-ASC" id="sort_3"
                           name="order" th:checked="${order == 'price-ASC'}">
                    <label class="form-check-label" for="sort_3">
                      <i class="fas fa-sort-amount-up me-2"></i>Giá thấp → cao
                    </label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" value="price-DESC" id="sort_4"
                           name="order" th:checked="${order == 'price-DESC'}">
                    <label class="form-check-label" for="sort_4">
                      <i class="fas fa-sort-amount-down me-2"></i>Giá cao → thấp
                    </label>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                  <i class="fas fa-filter me-2"></i>Lọc kết quả
                </button>
                <a th:href="@{/search(q=${query})}" class="btn btn-outline-secondary w-100 mt-2">
                  <i class="fas fa-times me-2"></i>Xóa bộ lọc
                </a>
              </form>
            </div>
          </div>
        </aside>

        <!-- Results Main -->
        <main class="col-lg-9">
          <!-- Empty State -->
          <div th:if="${#lists.isEmpty(sanphams)}" class="text-center py-5">
            <i class="fas fa-search fa-4x text-muted mb-4"></i>
            <h4 class="fw-bold mb-2">Không tìm thấy sản phẩm</h4>
            <p class="text-muted mb-4">Vui lòng thử lại với từ khóa hoặc bộ lọc khác</p>
            <a href="/" class="btn btn-primary">
              <i class="fas fa-home me-2"></i>Về trang chủ
            </a>
          </div>

          <!-- Products Grid -->
          <div th:if="${not #lists.isEmpty(sanphams)}" class="row g-3">
            <div th:each="sanpham : ${sanphams}" class="col-md-4 col-6">
              <div class="card product-card h-100 border-0 shadow-sm">
                <div class="card-body p-3">
                  <a th:href="@{/sanpham(id=${sanpham.idSanpham})}" class="product-img mb-3">
                    <img th:src="@{/image/{url}(url=${sanpham.hinh})}"
                         class="img-fluid" th:alt="${sanpham.tenSanpham}">
                    <div class="product-overlay">
                      <i class="fas fa-search-plus"></i>
                    </div>
                  </a>
                  <h6 class="product-title mb-2">
                    <a th:href="@{/sanpham(id=${sanpham.idSanpham})}" class="text-dark text-decoration-none">
                      <span th:text="${sanpham.tenSanpham}"></span>
                    </a>
                  </h6>
                  <div class="product-price mb-2">
                    <div th:if="${sanpham.giamgia == 0}">
                      <span class="fw-bold text-primary"
                            th:text="${#numbers.formatInteger(sanpham.gia, 0, 'COMMA') + '₫'}"></span>
                    </div>
                    <div th:if="${sanpham.giamgia > 0}" class="d-flex align-items-center flex-wrap gap-1">
                      <span class="fw-bold text-primary"
                            th:text="${#numbers.formatInteger(sanpham.gia * (100 - sanpham.giamgia) / 100, 0, 'COMMA') + '₫'}"></span>
                      <span class="text-decoration-line-through text-muted small"
                            th:text="${#numbers.formatInteger(sanpham.gia, 0, 'COMMA') + '₫'}"></span>
                      <span class="badge bg-danger small">-<span th:text="${sanpham.giamgia}"></span>%</span>
                    </div>
                  </div>
                  <div class="d-flex gap-2">
                    <button th:disabled="${sanpham.soluong == 0}"
                            th:classappend="${sanpham.soluong == 0 ? 'btn-danger' : 'btn-primary'}"
                            type="button" class="btn btn-sm flex-grow-1 add-cart-item"
                            th:data-id="${sanpham.idSanpham}">
                      <i class="fas fa-cart-plus me-1"></i>
                      <span th:text="${sanpham.soluong == 0 ? 'Hết hàng' : 'Thêm vào giỏ'}"></span>
                    </button>
                    <button th:if="${sanpham.soluong > 0}" type="button"
                            class="btn btn-sm btn-outline-primary buy-now"
                            th:data-id="${sanpham.idSanpham}">
                      <i class="fas fa-bolt"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Pagination -->
          <div th:if="${totalPages > 1}" class="mt-4">
            <nav class="d-flex justify-content-center">
              <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                  <a class="page-link" th:href="@{/search(q=${query},page=${currentPage - 1},idLoai=${idLoai},priceRanges=${priceRanges},order=${order})}">
                    <i class="fas fa-chevron-left"></i>
                  </a>
                </li>
                <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                    class="page-item" th:classappend="${currentPage == i - 1} ? 'active'">
                  <a class="page-link"
                     th:href="@{/search(q=${query},page=${i - 1},idLoai=${idLoai},priceRanges=${priceRanges},order=${order})}"
                     th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                  <a class="page-link" th:href="@{/search(q=${query},page=${currentPage + 1},idLoai=${idLoai},priceRanges=${priceRanges},order=${order})}">
                    <i class="fas fa-chevron-right"></i>
                  </a>
                </li>
              </ul>
            </nav>
          </div>
        </main>

      </div>
    </div>
  </section>

  <th:block th:replace="~{user/_footer}" />

  <style>
    .product-img {
      display: block;
      aspect-ratio: 1;
      background: #f8f9fa;
      overflow: hidden;
      border-radius: 0.5rem;
      position: relative;
    }

    .product-img img {
      object-fit: contain;
      height: 100%;
      transition: transform 0.3s ease;
    }

    .product-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .product-overlay i {
      color: white;
      font-size: 1.5rem;
    }

    .product-img:hover img {
      transform: scale(1.05);
    }

    .product-img:hover .product-overlay {
      opacity: 1;
    }

    .product-card {
      transition: transform 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 1rem;
      line-height: 1.5;
    }

    .page-link {
      border: none;
      padding: 0.5rem 0.75rem;
      color: #6c757d;
    }

    .page-link:hover {
      background-color: #e9ecef;
      color: #0d6efd;
    }

    .page-item.active .page-link {
      background-color: #0d6efd;
      color: #fff;
    }

    @media (max-width: 767.98px) {
      .product-title {
        font-size: 0.9rem;
      }
    }
  </style>
</body>
</html>
