<!DOCTYPE html>
<html lang="vi">
<head>
  <th:block th:replace="~{user/_meta}" />
  <title>Sản phẩm mới - MEDISALE</title>
  <script th:src="@{/js/toast.js}" type="module"></script>
  <script th:src="@{/js/home.js}" type="module"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="bg-light">
  <th:block th:replace="~{user/_header}" />

  <section class="section-pagetop bg-white border-bottom">
    <div class="container py-4">
      <h2 class="fw-bold mb-1"><i class="fas fa-star text-primary me-2"></i>Sản phẩm mới</h2>
      <p class="text-muted mb-0">Cập nhật các sản phẩm mới nhất vừa lên kệ.</p>
    </div>
  </section>

  <section class="section-content py-5">
    <div class="container">
      <div class="row g-3">
        <div th:each="sanpham : ${sanphams}" class="col-xl-3 col-lg-4 col-md-6">
          <div class="card border-0 shadow-sm h-100 product-card">
            <div class="card-body p-3">
              <a th:href="@{/sanpham(id=${sanpham.idSanpham})}" class="product-img mb-3">
                <img th:src="@{/image/{url}(url=${sanpham.hinh})}" th:alt="${sanpham.tenSanpham}" class="img-fluid">
              </a>
              <h6 class="mb-2 product-title">
                <a th:href="@{/sanpham(id=${sanpham.idSanpham})}" class="text-dark text-decoration-none"
                  th:text="${sanpham.tenSanpham}"></a>
              </h6>
              <div class="fw-bold text-primary mb-3"
                th:text="${#numbers.formatInteger(sanpham.gia * (100 - sanpham.giamgia) / 100, 0, 'COMMA') + '₫'}"></div>
              <div class="d-flex gap-2">
                <button class="btn btn-primary btn-sm flex-grow-1 add-cart-item"
                  th:data-id="${sanpham.idSanpham}" th:disabled="${sanpham.soluong == 0}">
                  <i class="fas fa-cart-plus me-1"></i>
                  <span th:text="${sanpham.soluong == 0 ? 'Hết hàng' : 'Thêm vào giỏ'}"></span>
                </button>
                <button th:if="${sanpham.soluong > 0}" class="btn btn-outline-primary btn-sm buy-now"
                  th:data-id="${sanpham.idSanpham}">
                  <i class="fas fa-bolt"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${totalPages > 1}" class="mt-4">
        <nav class="d-flex justify-content-center">
          <ul class="pagination mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
              <a class="page-link" th:href="@{/san-pham-moi(page=${currentPage - 1})}"><i class="fas fa-chevron-left"></i></a>
            </li>
            <li th:each="i : ${#numbers.sequence(1, totalPages)}" class="page-item"
              th:classappend="${currentPage == i - 1} ? 'active'">
              <a class="page-link" th:href="@{/san-pham-moi(page=${i - 1})}" th:text="${i}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
              <a class="page-link" th:href="@{/san-pham-moi(page=${currentPage + 1})}"><i class="fas fa-chevron-right"></i></a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </section>

  <th:block th:replace="~{user/_footer}" />

  <style>
    .product-card { transition: .25s; border-radius: 1rem; }
    .product-card:hover { transform: translateY(-4px); }
    .product-img { display: block; aspect-ratio: 1; overflow: hidden; border-radius: .7rem; background: #f6f8fb; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-title { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 44px; }
  </style>
</body>
</html>
