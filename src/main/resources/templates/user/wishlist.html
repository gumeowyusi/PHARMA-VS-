<!DOCTYPE html>
<html lang="vi">
<head>
  <th:block th:replace="~{user/_meta}" />
  <title>Danh sách yêu thích</title>
  <script th:src="@{/js/toast.js}" type="module"></script>
  <script th:src="@{/js/home.js}" type="module"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="bg-light">
  <th:block th:replace="~{user/_header}" />

  <!-- Page Header -->
  <section class="bg-white border-bottom py-4">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div>
          <h2 class="fw-bold mb-1">
            <i class="fas fa-heart text-danger me-2"></i>Danh sách yêu thích
          </h2>
          <p class="text-muted mb-0">
            <span class="fw-bold text-primary" th:text="${totalItems}"></span> sản phẩm đã lưu
          </p>
        </div>
        <a href="/" class="btn btn-outline-primary">
          <i class="fas fa-shopping-bag me-2"></i>Tiếp tục mua sắm
        </a>
      </div>
    </div>
  </section>

  <section class="section-content py-5">
    <div class="container">

      <!-- Empty State -->
      <div th:if="${#lists.isEmpty(wishlists)}" class="text-center py-5">
        <i class="fas fa-heart-broken fa-4x text-muted mb-4"></i>
        <h4 class="fw-bold mb-2">Chưa có sản phẩm yêu thích</h4>
        <p class="text-muted mb-4">Nhấn vào biểu tượng ♡ trên sản phẩm để thêm vào danh sách</p>
        <a href="/" class="btn btn-primary px-4">
          <i class="fas fa-home me-2"></i>Khám phá sản phẩm
        </a>
      </div>

      <!-- Wishlist Grid -->
      <div th:if="${not #lists.isEmpty(wishlists)}" class="row g-3">
        <div th:each="item : ${wishlists}" class="col-xl-3 col-lg-4 col-md-6"
             th:id="'wishlist-item-' + ${item.sanPham.idSanpham}">
          <div class="card product-card h-100 border-0 shadow-sm">
            <div class="card-body p-3 position-relative">
              <!-- Remove button -->
              <button class="btn btn-sm btn-remove-wishlist position-absolute top-0 end-0 m-2"
                      th:data-id="${item.sanPham.idSanpham}"
                      title="Xóa khỏi yêu thích">
                <i class="fas fa-heart text-danger"></i>
              </button>

              <a th:href="@{/sanpham(id=${item.sanPham.idSanpham})}" class="product-img mb-3">
                <img th:src="@{/image/{url}(url=${item.sanPham.hinh})}"
                     class="img-fluid" th:alt="${item.sanPham.tenSanpham}">
              </a>

              <h6 class="product-title mb-2">
                <a th:href="@{/sanpham(id=${item.sanPham.idSanpham})}"
                   class="text-dark text-decoration-none"
                   th:text="${item.sanPham.tenSanpham}"></a>
              </h6>

              <div class="mb-2">
                <div th:if="${item.sanPham.giamgia == 0}">
                  <span class="fw-bold text-primary"
                        th:text="${#numbers.formatInteger(item.sanPham.gia, 0, 'COMMA') + '₫'}"></span>
                </div>
                <div th:if="${item.sanPham.giamgia > 0}" class="d-flex align-items-center flex-wrap gap-1">
                  <span class="fw-bold text-primary"
                        th:text="${#numbers.formatInteger(item.sanPham.gia * (100 - item.sanPham.giamgia) / 100, 0, 'COMMA') + '₫'}"></span>
                  <span class="text-decoration-line-through text-muted small"
                        th:text="${#numbers.formatInteger(item.sanPham.gia, 0, 'COMMA') + '₫'}"></span>
                  <span class="badge bg-danger small">-<span th:text="${item.sanPham.giamgia}"></span>%</span>
                </div>
              </div>

              <div class="d-flex gap-2">
                <button th:disabled="${item.sanPham.soluong == 0}"
                        th:classappend="${item.sanPham.soluong == 0 ? 'btn-danger' : 'btn-primary'}"
                        type="button" class="btn btn-sm flex-grow-1 add-cart-item"
                        th:data-id="${item.sanPham.idSanpham}">
                  <i class="fas fa-cart-plus me-1"></i>
                  <span th:text="${item.sanPham.soluong == 0 ? 'Hết hàng' : 'Thêm vào giỏ'}"></span>
                </button>
                <button th:if="${item.sanPham.soluong > 0}" type="button"
                        class="btn btn-sm btn-outline-primary buy-now"
                        th:data-id="${item.sanPham.idSanpham}">
                  <i class="fas fa-bolt"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <div th:if="${totalPages > 1}" class="mt-4">
        <nav class="d-flex justify-content-center">
          <ul class="pagination mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
              <a class="page-link" th:href="@{/wishlist(page=${currentPage - 1})}">
                <i class="fas fa-chevron-left"></i>
              </a>
            </li>
            <li th:each="i : ${#numbers.sequence(1, totalPages)}"
                class="page-item" th:classappend="${currentPage == i - 1} ? 'active'">
              <a class="page-link" th:href="@{/wishlist(page=${i - 1})}" th:text="${i}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
              <a class="page-link" th:href="@{/wishlist(page=${currentPage + 1})}">
                <i class="fas fa-chevron-right"></i>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </section>

  <th:block th:replace="~{user/_footer}" />

  <style>
    .product-img {
      display: block;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 0.5rem;
      background: #f8f9fa;
    }
    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.3s;
    }
    .product-img:hover img { transform: scale(1.05); }
    .product-card { transition: transform 0.2s; }
    .product-card:hover { transform: translateY(-4px); }
    .product-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.9rem;
    }
    .btn-remove-wishlist {
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: transform 0.2s;
    }
    .btn-remove-wishlist:hover { transform: scale(1.2); }
  </style>

  <script>
    document.querySelectorAll('.btn-remove-wishlist').forEach(btn => {
      btn.addEventListener('click', async function () {
        const id = this.dataset.id;
        const res = await fetch(`/wishlist/remove/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          const card = document.getElementById('wishlist-item-' + id);
          if (card) card.remove();
          const count = document.querySelectorAll('[id^="wishlist-item-"]').length;
          const countEl = document.querySelector('.fw-bold.text-primary');
          if (countEl) countEl.textContent = count;
          if (count === 0) location.reload();
        }
      });
    });
  </script>
</body>
</html>
