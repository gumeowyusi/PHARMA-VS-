<!DOCTYPE html>
<html lang="vi">
<head>
  <th:block th:replace="~{user/_meta}" />
  <title>Khuyến mãi - MEDISALE</title>
  <script th:src="@{/js/toast.js}" type="module"></script>
  <script th:src="@{/js/home.js}" type="module"></script>
</head>
<body class="bg-light">
  <th:block th:replace="~{user/_header}" />

  <section class="section-pagetop promo-hero text-white">
    <div class="container py-5">
      <h2 class="fw-bold mb-2"><i class="fas fa-tags me-2"></i>Khuyến mãi hôm nay</h2>
      <p class="mb-0 opacity-75">Sản phẩm giảm giá tốt, ưu đãi số lượng có hạn.</p>
    </div>
  </section>

  <section class="py-5">
    <div class="container">
      <div class="row g-3">
        <div th:each="sanpham : ${sanphams}" class="col-xl-3 col-lg-4 col-md-6">
          <div class="card border-0 shadow-sm h-100 product-card">
            <div class="card-body p-3">
              <a th:href="@{/sanpham(id=${sanpham.idSanpham})}" class="product-img mb-3">
                <img th:src="@{/image/{url}(url=${sanpham.hinh})}" th:alt="${sanpham.tenSanpham}" class="img-fluid">
                <span class="badge bg-danger discount-badge">-<span th:text="${sanpham.giamgia}"></span>%</span>
              </a>
              <h6 class="mb-2 product-title">
                <a th:href="@{/sanpham(id=${sanpham.idSanpham})}" class="text-dark text-decoration-none"
                  th:text="${sanpham.tenSanpham}"></a>
              </h6>
              <div class="mb-3">
                <span class="fw-bold text-primary me-2"
                  th:text="${#numbers.formatInteger(sanpham.gia * (100 - sanpham.giamgia) / 100, 0, 'COMMA') + '₫'}"></span>
                <span class="text-muted text-decoration-line-through small"
                  th:text="${#numbers.formatInteger(sanpham.gia, 0, 'COMMA') + '₫'}"></span>
              </div>
              <button class="btn btn-primary btn-sm w-100 add-cart-item"
                th:data-id="${sanpham.idSanpham}" th:disabled="${sanpham.soluong == 0}">
                <i class="fas fa-cart-plus me-1"></i>
                <span th:text="${sanpham.soluong == 0 ? 'Hết hàng' : 'Thêm vào giỏ'}"></span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${totalPages > 1}" class="mt-4">
        <nav class="d-flex justify-content-center">
          <ul class="pagination mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
              <a class="page-link" th:href="@{/khuyen-mai(page=${currentPage - 1})}"><i class="fas fa-chevron-left"></i></a>
            </li>
            <li th:each="i : ${#numbers.sequence(1, totalPages)}" class="page-item"
              th:classappend="${currentPage == i - 1} ? 'active'">
              <a class="page-link" th:href="@{/khuyen-mai(page=${i - 1})}" th:text="${i}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
              <a class="page-link" th:href="@{/khuyen-mai(page=${currentPage + 1})}"><i class="fas fa-chevron-right"></i></a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </section>

  <th:block th:replace="~{user/_footer}" />
  <style>
    .promo-hero { background: linear-gradient(120deg, #0d6efd, #6f42c1); }
    .product-card { border-radius: 1rem; transition: .25s; }
    .product-card:hover { transform: translateY(-4px); }
    .product-img { position: relative; display:block; aspect-ratio:1; border-radius:.7rem; overflow:hidden; background:#f6f8fb; }
    .product-img img { width:100%; height:100%; object-fit:cover; }
    .discount-badge { position:absolute; top:10px; left:10px; }
    .product-title { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 44px; }
  </style>
</body>
</html>
