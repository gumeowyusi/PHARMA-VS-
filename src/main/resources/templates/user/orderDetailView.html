<!DOCTYPE html>
<html lang="vi">

<head>
  <th:block th:replace="~{user/_meta}" />
  <title th:text="'Thông tin đơn hàng #' + ${order.idHoadon}"></title>
  <script th:src="@{/js/toast.js}" type="module"></script>
  <script th:src="@{/js/home.js}" type="module"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body class="bg-light">
  <th:block th:replace="~{user/_header}" />

  <!-- Page Header -->
  <section class="section-pagetop bg-white border-bottom">
    <div class="container">
      <div class="d-flex align-items-center py-4">
        <i class="fas fa-file-invoice fa-2x text-primary me-3"></i>
        <h2 class="title-page fw-bold mb-0" th:text="'Thông tin đơn hàng #' + ${order.idHoadon}"></h2>
      </div>
    </div>
  </section>

  <!-- Order Detail Section -->
  <section class="section-content py-5">
    <div class="container">
      <div class="row">
        <!-- Navigation Panel -->
        <div class="col-lg-3 mb-4 mb-lg-0">
          <th:block th:insert="~{user/navPanel :: nav(active='ORDER')}"></th:block>
        </div>

        <!-- Order Content -->
        <main class="col-lg-9">
          <div class="card border-0 shadow-sm">
            <!-- Order Header -->
            <div class="card-header bg-white p-4 border-0">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <h5 class="mb-1">
                    <i class="fas fa-hashtag text-primary me-2"></i>
                    <span th:text="'Mã đơn hàng: ' + ${order.idHoadon}"></span>
                  </h5>
                  <p class="text-muted mb-0">
                    <i class="far fa-calendar-alt me-2"></i>
                    <span th:text="'Ngày mua: ' + ${#dates.format(order.ngaytao, 'dd/MM/yyyy')}"></span>
                  </p>
                </div>
                <div>
                  <th:block th:if="${order.trangthai == 'pending'}">
                    <span class="badge bg-secondary fs-6 px-3 py-2">
                      <i class="fas fa-clock me-1"></i>Chờ xác nhận
                    </span>
                  </th:block>
                  <th:block th:if="${order.trangthai == 'paid'}">
                    <span class="badge bg-info text-dark fs-6 px-3 py-2">
                      <i class="fas fa-credit-card me-1"></i>Đã thanh toán — Chờ giao
                    </span>
                  </th:block>
                  <th:block th:if="${order.trangthai == 'confirmed'}">
                    <span class="badge bg-primary fs-6 px-3 py-2">
                      <i class="fas fa-clipboard-check me-1"></i>Đã xác nhận
                    </span>
                  </th:block>
                  <th:block th:if="${order.trangthai == 'ondelivery'}">
                    <span class="badge bg-warning text-dark fs-6 px-3 py-2">
                      <i class="fas fa-truck me-1"></i>Đang giao hàng
                    </span>
                  </th:block>
                  <th:block th:if="${order.trangthai == 'received'}">
                    <span class="badge bg-success fs-6 px-3 py-2">
                      <i class="fas fa-check-circle me-1"></i>Giao hàng thành công
                    </span>
                  </th:block>
                  <th:block th:if="${order.trangthai == 'cancel'}">
                    <span class="badge bg-danger fs-6 px-3 py-2">
                      <i class="fas fa-times-circle me-1"></i>Đã hủy
                    </span>
                  </th:block>
                </div>
              </div>
            </div>

            <!-- Order Tracking Timeline -->
            <div class="px-4 pb-2">
              <div class="order-timeline d-flex align-items-start justify-content-between position-relative">
                <!-- Step 1: Đã đặt hàng -->
                <div class="timeline-step text-center flex-fill">
                  <div class="step-circle bg-primary text-white mx-auto mb-2">
                    <i class="fas fa-shopping-bag"></i>
                  </div>
                  <div class="small fw-semibold">Đã đặt hàng</div>
                  <div class="text-muted" style="font-size:.75rem;"
                       th:text="${#dates.format(order.ngaytao,'dd/MM/yyyy')}"></div>
                </div>
                <!-- Step 2: Xác nhận -->
                <div class="timeline-step text-center flex-fill">
                  <div class="step-circle mx-auto mb-2"
                       th:classappend="${order.trangthai == 'confirmed' or order.trangthai == 'ondelivery' or order.trangthai == 'received'} ? 'bg-primary text-white' : (${order.trangthai == 'paid'} ? 'bg-info text-dark' : 'bg-light text-muted border')">
                    <i class="fas fa-clipboard-check"></i>
                  </div>
                  <div class="small fw-semibold">Xác nhận</div>
                  <div class="text-muted" style="font-size:.75rem;"
                       th:text="${order.trangthai == 'pending'} ? 'Chờ xác nhận' : (${order.trangthai == 'paid'} ? 'Đã thanh toán' : 'Đã xác nhận')"></div>
                </div>
                <!-- Step 3: Đang giao -->
                <div class="timeline-step text-center flex-fill">
                  <div class="step-circle mx-auto mb-2"
                       th:classappend="${order.trangthai == 'ondelivery' or order.trangthai == 'received'} ? 'bg-warning text-dark' : 'bg-light text-muted border'">
                    <i class="fas fa-truck"></i>
                  </div>
                  <div class="small fw-semibold">Đang giao</div>
                  <div class="text-muted" style="font-size:.75rem;"
                       th:text="${order.trangthai == 'ondelivery' or order.trangthai == 'received'} ? 'Trên đường' : '--'"></div>
                </div>
                <!-- Step 4: Hoàn tất / Hủy -->
                <div class="timeline-step text-center flex-fill">
                  <div th:if="${order.trangthai == 'received'}"
                       class="step-circle bg-success text-white mx-auto mb-2">
                    <i class="fas fa-check-circle"></i>
                  </div>
                  <div th:if="${order.trangthai == 'cancel'}"
                       class="step-circle bg-danger text-white mx-auto mb-2">
                    <i class="fas fa-times-circle"></i>
                  </div>
                  <div th:if="${order.trangthai == 'ondelivery'}"
                       class="step-circle bg-light text-muted border mx-auto mb-2">
                    <i class="fas fa-check-circle"></i>
                  </div>
                  <div class="small fw-semibold"
                       th:text="${order.trangthai == 'cancel'} ? 'Đã hủy' : 'Hoàn tất'"></div>
                  <div class="text-muted" style="font-size:.75rem;"
                       th:text="${order.trangthai == 'received'} ? 'Giao thành công' : (${order.trangthai == 'cancel'} ? 'Đơn bị hủy' : '--')"></div>
                </div>
              </div>
            </div>
            <hr class="mx-4 mt-0">

            <!-- Order Info -->
            <div class="card-body p-4">
              <div class="row">
                <!-- Shipping Address -->
                <div class="col-lg-8 mb-4 mb-lg-0">
                  <div class="shipping-info">
                    <h6 class="text-muted mb-3">
                      <i class="fas fa-map-marker-alt me-2"></i>Địa chỉ người nhận
                    </h6>
                    <div class="bg-light p-3 rounded">
                      <p class="mb-2">
                        <i class="fas fa-user me-2 text-primary"></i>
                        <span th:text="${currentUser.hoten}"></span>
                      </p>
                      <p class="mb-2">
                        <i class="fas fa-phone me-2 text-primary"></i>
                        <span th:text="${currentUser.sdt}"></span>
                      </p>
                      <p class="mb-0">
                        <i class="fas fa-home me-2 text-primary"></i>
                        <span th:text="${order.diachi}"></span>
                      </p>
                    </div>
                  </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4">
                  <div class="order-summary">
                    <h6 class="text-muted mb-3">
                      <i class="fas fa-info-circle me-2"></i>Thông tin thanh toán
                    </h6>
                    <div class="bg-light p-3 rounded">
                      <p class="mb-2 d-flex justify-content-between">
                        <span class="text-muted">
                          <i class="fas fa-shipping-fast me-2"></i>Phương thức:
                        </span>
                        <span class="text-success" th:text="${order.giaohang}"></span>
                      </p>
                      <p class="mb-2 d-flex justify-content-between">
                        <span class="text-muted">Tạm tính:</span>
                        <span th:text="${#numbers.formatInteger(tempPrice, 0, 'COMMA')} + '₫'"></span>
                      </p>
                      <p class="mb-2 d-flex justify-content-between">
                        <span class="text-muted">Phí vận chuyển:</span>
                        <span th:text="${#numbers.formatInteger(deliveryPrice, 0, 'COMMA')} + '₫'"></span>
                      </p>
                      <hr>
                      <p class="mb-0 d-flex justify-content-between fw-bold">
                        <span>Tổng cộng:</span>
                        <span class="text-primary"
                          th:text="${#numbers.formatInteger(tempPrice + deliveryPrice, 0, 'COMMA')} + '₫'"></span>
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Order Items -->
              <div class="order-items mt-4">
                <h6 class="text-muted mb-3">
                  <i class="fas fa-box me-2"></i>Sản phẩm đã mua
                </h6>
                <div class="table-responsive">
                  <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                      <tr>
                        <th scope="col">Sản phẩm</th>
                        <th scope="col" class="text-end">Giá</th>
                        <th scope="col" class="text-center">Số lượng</th>
                        <th scope="col" class="text-end">Thành tiền</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr th:each="sanpham : ${listSanPham}">
                        <td>
                          <div class="d-flex align-items-center">
                            <img width="60" height="60" class="rounded me-3"
                              th:src="@{/image/{url}(url=${sanpham.hinh})}" th:alt="${sanpham.tenSanpham}">
                            <div>
                              <h6 class="mb-0">
                                <a th:href="@{/sanpham(id=${sanpham.idSanpham})}" class="text-dark text-decoration-none"
                                  th:text="${sanpham.tenSanpham}"></a>
                              </h6>
                            </div>
                          </div>
                        </td>
                        <td class="text-end">
                          <div th:if="${sanpham.giamgia == 0}">
                            <span th:text="${#numbers.formatInteger(sanpham.gia, 0, 'COMMA')} + '₫'"></span>
                          </div>
                          <div th:if="${sanpham.giamgia > 0}">
                            <span
                              th:text="${#numbers.formatInteger(sanpham.gia * (100 - sanpham.giamgia) / 100, 0, 'COMMA')} + '₫'"></span>
                            <br>
                            <small class="text-muted text-decoration-line-through">
                              <span th:text="${#numbers.formatInteger(sanpham.gia, 0, 'COMMA')} + '₫'"></span>
                            </small>
                          </div>
                        </td>
                        <td class="text-center" th:text="${sanpham.soluong}"></td>
                        <td class="text-end fw-bold">
                          <span th:if="${sanpham.giamgia == 0}"
                            th:text="${#numbers.formatInteger(sanpham.gia * sanpham.soluong, 0, 'COMMA')} + '₫'"></span>
                          <span th:if="${sanpham.giamgia > 0}"
                            th:text="${#numbers.formatInteger(sanpham.gia * (100 - sanpham.giamgia) / 100 * sanpham.soluong, 0, 'COMMA')} + '₫'"></span>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <!-- Order Actions -->
            <div class="card-footer bg-white p-4 border-0">
              <form th:action="@{/orderDetail}" method="post">
                <input type="hidden" name="id" th:value="${order.idHoadon}">
                <button type="submit" th:if="${order.trangthai == 'ondelivery'}" class="btn btn-danger"
                  onclick="return confirm('Bạn có muốn hủy đơn hàng?')">
                  <i class="fas fa-times-circle me-2"></i>Hủy đơn hàng
                </button>
              </form>
            </div>
          </div>
        </main>
      </div>
    </div>
  </section>

  <th:block th:replace="~{user/_footer}" />

  <style> 
    .badge {
      padding: 0.5rem 0.75rem;
      font-weight: 500;
    }

    .table> :not(caption)>*>* {
      padding: 1rem;
    }

    .shipping-info p:last-child,
    .order-summary p:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 767.98px) {
      .table> :not(caption)>*>* {
        padding: 0.75rem;
      }
    }

    /* Order tracking timeline */
    .order-timeline {
      padding: 1.25rem 0 1rem;
      position: relative;
    }
    .order-timeline::before {
      content: '';
      position: absolute;
      top: 2rem;
      left: 10%;
      right: 10%;
      height: 3px;
      background: #dee2e6;
      z-index: 0;
    }
    .timeline-step {
      position: relative;
      z-index: 1;
    }
    .step-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      border: 3px solid transparent;
      box-shadow: 0 2px 6px rgba(0,0,0,.12);
    }
    .step-circle.bg-primary  { border-color: #0d6efd; }
    .step-circle.bg-success  { border-color: #198754; }
    .step-circle.bg-danger   { border-color: #dc3545; }
    .step-circle.bg-light    { border-color: #dee2e6; box-shadow: none; }
  </style>
</body>

</html>
