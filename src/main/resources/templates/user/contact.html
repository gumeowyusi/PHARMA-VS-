<!DOCTYPE html>
<html lang="vi">
<head>
  <th:block th:replace="~{user/_meta}" />
  <title>Liên hệ - MEDISALE</title>
</head>
<body class="bg-light">
  <th:block th:replace="~{user/_header}" />

  <section class="bg-white border-bottom">
    <div class="container py-4">
      <h2 class="fw-bold mb-1"><i class="fas fa-phone-alt text-primary me-2"></i>Liên hệ MEDISALE</h2>
      <p class="text-muted mb-0">Để lại thông tin, đội ngũ tư vấn sẽ liên hệ nhanh nhất có thể.</p>
    </div>
  </section>

  <section class="py-5">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
              <form method="post" th:action="@{/lien-he}">
                <div class="mb-3">
                  <label class="form-label fw-semibold">Họ và tên</label>
                  <input class="form-control" type="text" name="name" placeholder="Nhập họ tên của bạn" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">Số điện thoại</label>
                  <input class="form-control" type="text" name="phone" placeholder="Ví dụ: 09xxxxxxxx"
                    th:value="${lastPhone}">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold">Nội dung cần hỗ trợ</label>
                  <textarea class="form-control" rows="5" name="message" placeholder="Mô tả nhu cầu của bạn..."
                    th:text="${lastMessage}"></textarea>
                </div>
                <button class="btn btn-primary px-4" type="submit">
                  <i class="fas fa-paper-plane me-2"></i>Gửi thông tin
                </button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-3">Thông tin nhà thuốc</h5>
              <p class="mb-2"><i class="fas fa-map-marker-alt text-primary me-2"></i>Thành phố Hồ Chí Minh, Việt Nam</p>
              <p class="mb-2"><i class="fas fa-phone text-primary me-2"></i>0353048599</p>
              <p class="mb-4"><i class="fas fa-envelope text-primary me-2"></i>capyboy.dev@gmail.com</p>
              <div class="small text-muted">Giờ hoạt động: 08:00 - 22:00 tất cả các ngày trong tuần.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <th:block th:replace="~{user/_footer}" />
</body>
</html>
