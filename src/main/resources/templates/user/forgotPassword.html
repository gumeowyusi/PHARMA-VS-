<!DOCTYPE html>
<html lang="vi">

<head>
  <th:block th:replace="~{user/_meta}" />
  <title>Quên mật khẩu - MEDISALE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #0d6efd;
      --secondary: #20c997;
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }

    body {
      background: #f4f7f6;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .auth-page-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 10% 80%, rgba(245, 158, 11, 0.08), transparent 40%),
        radial-gradient(circle at 90% 20%, rgba(13, 110, 253, 0.08), transparent 40%);
      animation: ambientShift 15s ease-in-out infinite alternate;
    }

    @keyframes ambientShift {
      0% {
        transform: scale(1);
      }

      100% {
        transform: scale(1.1);
      }
    }

    .auth-wrapper {
      min-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      padding: 3rem 0;
    }

    .auth-card {
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      overflow: hidden;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--glass-shadow);
      transform: translateY(20px);
      opacity: 0;
      animation: cardFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      padding: 3rem;
    }

    @keyframes cardFadeUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .auth-card h4 {
      font-weight: 700;
      color: #1e293b;
      font-size: 1.75rem;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(13, 110, 253, 0.1), rgba(32, 201, 151, 0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      color: var(--primary);
    }

    .form-floating>.form-control {
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding-left: 3rem;
      font-weight: 500;
      color: #334155;
      transition: all 0.3s ease;
      height: 3.5rem;
    }

    .form-floating>label {
      padding-left: 3rem;
      color: #94a3b8;
      font-weight: 500;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      z-index: 10;
      transition: color 0.3s ease;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
    }

    .form-control:focus~.input-icon {
      color: var(--primary);
    }

    .btn-auth {
      height: 3.5rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.3px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      background-size: 200% auto;
      box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
    }

    .btn-auth:hover {
      background-position: right center;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(13, 110, 253, 0.4);
      color: #fff;
    }

    .btn-auth:active {
      transform: translateY(1px);
    }

    @media (max-width: 575.98px) {
      .auth-card {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="auth-page-bg"></div>
  <th:block th:replace="~{user/_header}" />

  <div class="container auth-wrapper">
    <div class="row justify-content-center w-100">
      <div class="col-lg-5 col-md-7 col-sm-10">
        <div class="auth-card">

          <div class="text-center mb-4">
            <div class="icon-wrapper mb-3">
              <i class="fa-solid fa-unlock-keyhole fa-2x"></i>
            </div>
            <h4>Phục hồi mật khẩu</h4>
            <p class="text-muted">Nhập email của bạn để lấy lại quyền truy cập.</p>
          </div>

          <!-- Alerts -->
          <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center mb-4"
            style="border-radius: 12px; border: none; background: #fef2f2; color: #b91c1c;" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-2 fs-5"></i>
            <div th:text="${errorMessage}"></div>
          </div>
          <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center mb-4"
            style="border-radius: 12px; border: none; background: #ecfdf5; color: #047857;" role="alert">
            <i class="fa-solid fa-circle-check me-2 fs-5"></i>
            <div th:text="${successMessage}"></div>
          </div>

          <!-- Form -->
          <form th:action="@{/forgot-password}" method="post" novalidate id="forgotForm">

            <div class="position-relative mb-4 mt-2">
              <i class="fa-regular fa-envelope input-icon"></i>
              <div class="form-floating">
                <input class="form-control" id="inputEmail" placeholder="Email" type="email" autocomplete="off"
                  name="idUser" th:value="${idUser}" required>
                <label for="inputEmail">Địa chỉ Email</label>
              </div>
            </div>

            <button type="submit" class="btn btn-auth w-100 mb-4" id="submitBtn">
              <span>Gửi link xác nhận</span> <i class="fa-regular fa-paper-plane ms-2 transition-transform"></i>
            </button>

            <div class="text-center">
              <a th:href="@{/signin}"
                class="text-muted text-decoration-none fw-medium d-inline-flex align-items-center transition-transform hover-scale">
                <i class="fa-solid fa-arrow-left me-2 text-primary"></i> Quay lại đăng nhập
              </a>
            </div>

            <div class="text-center border-top pt-4 mt-4">
              <p class="mb-0 text-muted">
                Bạn chưa có tài khoản?
                <a th:href="@{/signup}" class="text-primary text-decoration-none fw-semibold">Tạo mới ngay</a>
              </p>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>

  <th:block th:replace="~{user/_footer}" />

  <script>
    // Button Click Animation
    const form = document.getElementById('forgotForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', function () {
      if (form.checkValidity()) {
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Đang gửi mail...';
        btn.style.opacity = '0.8';
        btn.style.pointerEvents = 'none';
      }
    });
  </script>
</body>

</html>
