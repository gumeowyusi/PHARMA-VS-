<!DOCTYPE html>
<html lang="vi">

<head>
  <th:block th:replace="~{user/_meta}" />
  <title>Thiết đặt</title>
  <script th:src="@{/js/toast.js}" type="module"></script>
  <script th:src="@{/js/home.js}" type="module"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
<th:block th:replace="~{user/_header}" />

<section class="section-pagetop bg-light">
  <div class="container">
    <h2 class="title-page">Thiết đặt</h2>
  </div> <!-- container.// -->
</section> <!-- section-pagetop.// -->

<section class="section-content padding-y">
  <div class="container">
    <div class="row">
		 <th:block th:insert="~{user/navPanel :: nav(active='SETTING')}"></th:block>
         <main class="col-md-9">
           <article class="card">
             <div class="card-body row">
              <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
        	  <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

               <div class="col-lg-6">
                 <form th:action="@{/setting}" method="post"  autocomplete="off" enctype="multipart/form-data">
                   <div class="mb-3 d-flex justify-content-center">
                    <label for="avatarInput" class="avatar-label">
				    	<img th:if="${user.hinh == null}" th:src="@{img/280px.png}" alt="Avatar" id="avatarPreview">
				    	<img th:if="${user.hinh != null}" th:src="@{/image/{url}(url=${user.hinh})}" th:alt="${user.hoten}" id="avatarPreview">
				  	</label>
				  	<input type="file" name="image" class="d-none" id="avatarInput" accept="image/*">
                   </div>
                   <div class="mb-3">
                     <label for="username" class="form-label">Tên đăng nhập</label>
                     <input type="text"
                            class="form-control"
                            id="username"
                            name="username" readonly
                            th:value="${user.idUser}">
                   </div>
                   <div class="mb-3">
                     <label for="hoten" class="form-label">Họ và tên</label>
                     <input type="text"
                            class="form-control"
                            id="hoten"
                            name="hoten"
                            th:value="${user.hoten}">
                   </div>
                   <div class="mb-3">
                     <label for="sdt" class="form-label">Số điện thoại</label>
                     <input type="text"
                            class="form-control"
                            id="sdt"
                            name="sdt"
                            th:value="${user.sdt}">
                   </div>
                   <div class="d-flex gap-2">
	                   <button type="submit" class="btn btn-primary w-100">Cập nhật thông tin mới</button>
	                   <button type="submit" form="cancel-account" class="btn btn-danger w-100" onclick="return confirm('Bạn có muốn hủy tài khoản?')">Hủy tài khoản</button>
                   </div>
                 </form>
                 
                 <form th:action="@{/cance-account}" method="post"
	                    id="cancel-account">
	                <input type="hidden" name="idUser" th:value="${user.idUser}">
	              </form>
               </div>

               <!-- Points section -->
               <div class="col-lg-6">
                 <div class="card border-0 shadow-sm mb-3" style="background: linear-gradient(135deg,#f0f7ff,#e8f4fd); border-radius:16px;">
                   <div class="card-body py-3 px-4">
                     <div class="d-flex align-items-center gap-3 mb-2">
                       <div style="width:48px;height:48px;background:linear-gradient(135deg,#f59e0b,#fbbf24);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                         <i class="fas fa-coins text-white fs-5"></i>
                       </div>
                       <div>
                         <div class="text-muted small fw-semibold">Điểm tích lũy</div>
                         <div class="fw-bold" style="font-size:1.6rem;color:#d97706;" th:text="${user.diemTichLuy != null ? user.diemTichLuy : 0} + ' điểm'"></div>
                       </div>
                     </div>
                     <div class="small text-muted">
                       <i class="fas fa-info-circle me-1"></i>
                       Mỗi <strong>1.000 VNĐ</strong> chi tiêu = <strong>1 điểm</strong>. Điểm được cộng khi đơn hàng giao thành công.
                     </div>
                   </div>
                 </div>

                 <div class="card border-0 shadow-sm" style="border-radius:16px;">
                   <div class="card-header bg-white border-0 pt-3 px-3 pb-0 fw-bold small">
                     <i class="fas fa-history text-primary me-1"></i> Lịch sử điểm
                   </div>
                   <div class="card-body p-0">
                     <div id="lichSuDiemList" class="list-group list-group-flush" style="max-height:240px;overflow-y:auto;">
                       <div class="text-center text-muted small py-3" id="lichSuLoading">
                         <span class="spinner-border spinner-border-sm me-1"></span> Đang tải...
                       </div>
                     </div>
                   </div>
                 </div>
               </div>
             </div> <!-- card-body.// -->
           </article>
         </main> <!-- col.// -->
    </div> <!-- row.// -->
  </div> <!-- container.// -->
</section> <!-- section-content.// -->


<th:block th:replace="~{user/_footer}" />
</body>
<script>
  // Load lịch sử tích điểm
  fetch('/api/diem/lich-su')
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById('lichSuDiemList');
      document.getElementById('lichSuLoading').remove();
      if (!data.length) {
        list.innerHTML = '<div class="text-center text-muted small py-3">Chưa có giao dịch điểm nào.</div>';
        return;
      }
      data.slice(0, 20).forEach(item => {
        const isEarn = item.loaiGiaoDich === 'EARN';
        const d = new Date(item.ngayTao);
        const dateStr = d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear();
        list.innerHTML += `<div class="list-group-item px-3 py-2 border-0 border-bottom d-flex justify-content-between align-items-center">
          <div>
            <div class="small fw-semibold">${item.ghiChu || (isEarn ? 'Tích điểm' : 'Đổi điểm')}</div>
            <div class="text-muted" style="font-size:.75rem">${dateStr}</div>
          </div>
          <span class="fw-bold ${isEarn ? 'text-success' : 'text-danger'}">${isEarn ? '+' : ''}${item.soLuongDiem} đ</span>
        </div>`;
      });
    })
    .catch(() => {
      const el = document.getElementById('lichSuLoading');
      if (el) el.textContent = 'Không thể tải lịch sử điểm.';
    });

  document.getElementById("avatarInput").addEventListener("change", function (event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        document.getElementById("avatarPreview").src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
  });
</script>
</html>
