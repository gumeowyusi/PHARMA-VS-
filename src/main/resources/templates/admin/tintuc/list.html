<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{user/_meta}" />
  <title>Quản lý Tin tức - MEDISALE Admin</title>
  <style>
    .page-title { font-weight: 700; font-size: 1.4rem; color: #1e293b; }
    .badge-theloai { font-size: .75rem; padding: .3em .65em; border-radius: .4rem; }
    .trang-thai-on  { background: #dcfce7; color: #15803d; }
    .trang-thai-off { background: #fee2e2; color: #b91c1c; }
    .article-preview { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
<th:block th:replace="~{admin/_headerAdmin}" />
<div class="container-fluid py-4">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
    <div>
      <h2 class="page-title mb-0"><i class="fas fa-newspaper text-primary me-2"></i>Quản lý Tin tức</h2>
      <p class="text-muted small mb-0">Đăng và quản lý bài viết y tế cho trang Tin tức</p>
    </div>
    <a th:href="@{/admin/tintuc/create}" class="btn btn-primary">
      <i class="fas fa-plus me-1"></i> Đăng bài mới
    </a>
  </div>

  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Tiêu đề</th>
              <th>Chuyên mục</th>
              <th>Tác giả</th>
              <th>Ngày đăng</th>
              <th>Lượt xem</th>
              <th>Trạng thái</th>
              <th class="text-end">Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(tinTucs)}">
              <td colspan="8" class="text-center py-5 text-muted">
                <i class="fas fa-newspaper fa-2x mb-2 d-block opacity-25"></i>
                Chưa có bài viết nào. <a th:href="@{/admin/tintuc/create}">Đăng bài ngay</a>
              </td>
            </tr>
            <tr th:each="tt, stat : ${tinTucs}">
              <td class="text-muted small" th:text="${stat.count}"></td>
              <td>
                <div class="fw-semibold article-preview" th:text="${tt.tieuDe}"></div>
                <div class="text-muted small article-preview" th:text="${tt.tomTat}"></div>
              </td>
              <td>
                <span class="badge-theloai" th:classappend="${
                  tt.theLoai == 'huong-dan' ? 'bg-primary-subtle text-primary' :
                  tt.theLoai == 'dinh-duong' ? 'bg-success-subtle text-success' :
                  tt.theLoai == 'an-toan-thuoc' ? 'bg-warning-subtle text-warning' :
                  tt.theLoai == 'meo-hay' ? 'bg-info-subtle text-info' :
                  tt.theLoai == 'song-khoe' ? 'bg-purple-subtle text-purple' :
                  tt.theLoai == 'phong-benh' ? 'bg-danger-subtle text-danger' : 'bg-secondary-subtle text-secondary'
                }" th:text="${
                  tt.theLoai == 'huong-dan' ? 'Hướng dẫn' :
                  tt.theLoai == 'dinh-duong' ? 'Dinh dưỡng' :
                  tt.theLoai == 'an-toan-thuoc' ? 'An toàn thuốc' :
                  tt.theLoai == 'meo-hay' ? 'Mẹo hay' :
                  tt.theLoai == 'song-khoe' ? 'Sống khỏe' :
                  tt.theLoai == 'phong-benh' ? 'Phòng bệnh' : tt.theLoai
                }"></span>
              </td>
              <td class="small" th:text="${tt.tacGia}"></td>
              <td class="small" th:text="${#dates.format(tt.ngayDang, 'dd/MM/yyyy')}"></td>
              <td class="small" th:text="${tt.luotXem}"></td>
              <td>
                <span class="badge" th:classappend="${tt.trangThai ? 'trang-thai-on' : 'trang-thai-off'}"
                      th:text="${tt.trangThai ? 'Hiện' : 'Ẩn'}"></span>
              </td>
              <td class="text-end">
                <a th:href="@{/tin-tuc/{id}(id=${tt.idTinTuc})}" target="_blank"
                   class="btn btn-sm btn-outline-secondary me-1" title="Xem">
                  <i class="fas fa-eye"></i>
                </a>
                <a th:href="@{/admin/tintuc/edit/{id}(id=${tt.idTinTuc})}"
                   class="btn btn-sm btn-outline-primary me-1" title="Sửa">
                  <i class="fas fa-edit"></i>
                </a>
                <form th:action="@{/admin/tintuc/toggle/{id}(id=${tt.idTinTuc})}" method="post" class="d-inline">
                  <button type="submit" class="btn btn-sm btn-outline-warning me-1"
                          th:title="${tt.trangThai ? 'Ẩn bài' : 'Hiện bài'}">
                    <i th:class="${tt.trangThai ? 'fas fa-eye-slash' : 'fas fa-eye'}"></i>
                  </button>
                </form>
                <form th:action="@{/admin/tintuc/delete/{id}(id=${tt.idTinTuc})}" method="post" class="d-inline"
                      onsubmit="return confirm('Xóa bài viết này?')">
                  <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                    <i class="fas fa-trash"></i>
                  </button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card-footer bg-transparent d-flex justify-content-between align-items-center" th:if="${totalPages > 1}">
      <span class="small text-muted">Trang <span th:text="${currentPage + 1}"></span> / <span th:text="${totalPages}"></span></span>
      <div class="d-flex gap-1">
        <a th:href="@{/admin/tintuc(page=${currentPage - 1})}" class="btn btn-sm btn-outline-secondary"
           th:classappend="${currentPage == 0 ? 'disabled' : ''}">‹</a>
        <a th:href="@{/admin/tintuc(page=${currentPage + 1})}" class="btn btn-sm btn-outline-secondary"
           th:classappend="${currentPage + 1 >= totalPages ? 'disabled' : ''}">›</a>
      </div>
    </div>
  </div>
</div>
<style>.bg-purple-subtle{background:#ede7f6}.text-purple{color:#6f42c1}</style>
<th:block th:replace="~{admin/_footerAdmin}" />
</body>
</html>
