server.port=8080

# Load secrets từ file riêng (gitignored) - xem application-secret.properties.example
spring.config.import=optional:classpath:application-secret.properties

# Database connection
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:STORE};encrypt=${DB_ENCRYPT:true};trustServerCertificate=${DB_TRUST_CERT:true};
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:Nhanhtam456}

# JPA settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

# SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${spring.mail.username:}
spring.mail.password=${spring.mail.password:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# PayOS credentials (set in application-secret.properties)
PAYOS_CLIENT_ID=${PAYOS_CLIENT_ID:}
PAYOS_API_KEY=${PAYOS_API_KEY:}
PAYOS_CHECKSUM_KEY=${PAYOS_CHECKSUM_KEY:}

