version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dant-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_TCP_PORT: "1433"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-Nhanhtam456}
    ports:
      - "${DB_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL","/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD:-Nhanhtam456} -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

volumes:
  sqlserver-data:

networks:
  app-net:
    driver: bridge
